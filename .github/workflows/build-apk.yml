name: Build NEXUS v6.0 APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Create gradlew if not exists
      run: |
        if [ ! -f gradlew ]; then
          echo "Creating gradlew..."
          chmod +x gradlew || true
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build with Gradle
      run: ./gradlew clean build --stacktrace || gradle clean build --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace || gradle assembleRelease --stacktrace

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: nexus-v6-apk
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: ignore

    - name: Create Release
      uses: actions/create-release@v1
      if: always()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v6.0-${{ github.run_number }}
        release_name: NEXUS v6.0 Build ${{ github.run_number }}
        body: |
          NEXUS v6.0 - Multi-Game AFK Bot
          Build: ${{ github.run_number }}
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false
